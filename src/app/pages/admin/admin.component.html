<div class="pt-32 pb-32 px-6 max-w-[1600px] mx-auto">
  <div class="glass-card p-8 md:p-12 rounded-[3rem]">
    
    <!-- TOP CONTROL BAR -->
    <div class="mb-12 flex flex-col lg:flex-row justify-between items-center bg-white/5 p-6 rounded-[2rem] border border-white/10 gap-6">
      <div class="flex items-center gap-6">
        <div>
          <span class="block text-[10px] uppercase text-gray-500 font-bold mb-2">Academy Library</span>
          <select (change)="loadLibraryPreset($event)" class="bg-black/50 border border-white/10 text-white p-3 rounded-xl text-sm outline-none focus:border-yellow-500">
            <option value="">-- Load Preset --</option>
            <option value="viswa-academy.json">Viswa Academy</option>
            <option value="legends-academy.json">Legends Academy</option>
            <option value="royal-academy.json">Royal Academy</option>
          </select>
        </div>
        <div class="h-10 w-px bg-white/10"></div>
        <div>
          <span class="block text-[10px] uppercase text-gray-500 font-bold mb-2">Cloud Sync</span>
          <div class="flex gap-2">
            <input type="file" #fileInput (change)="onFileSelected($event)" accept=".json" class="hidden">
            <button (click)="fileInput.click()" class="glass-card px-4 py-2 rounded-lg text-xs font-bold uppercase hover:bg-white/10 transition">Upload JSON</button>
            <button (click)="exportConfig()" class="bg-blue-600 px-4 py-2 rounded-lg text-xs font-bold uppercase transition hover:bg-blue-500 text-white">Download JSON</button>
          </div>
        </div>
      </div>
      
      <div class="text-right">
        <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Master Project</span>
        <h2 class="text-3xl font-black text-white uppercase italic" *ngIf="editableConfig">{{ editableConfig.name }}</h2>
      </div>
    </div>

    <!-- MAIN BUILDER GRID -->
    <div class="grid lg:grid-cols-2 gap-16" *ngIf="editableConfig">
      
      <!-- LEFT: VISUAL EDITOR -->
      <div class="space-y-12">
        
        <!-- Identity -->
        <section class="space-y-4">
          <h3 class="text-xs font-bold text-yellow-500 uppercase tracking-widest mb-4">1. Brand Identity</h3>
          <div class="grid grid-cols-2 gap-4">
            <input [(ngModel)]="editableConfig.name" (ngModelChange)="updateRawJsonPreview()" placeholder="Full Name" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none">
            <input [(ngModel)]="editableConfig.brandName" (ngModelChange)="updateRawJsonPreview()" placeholder="Logo Initials" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none">
          </div>
          <input [(ngModel)]="editableConfig.primaryColor" (ngModelChange)="updateRawJsonPreview()" placeholder="Color Name (e.g. yellow-500)" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none">
        </section>

        <!-- Content -->
        <section class="space-y-4">
          <h3 class="text-xs font-bold text-yellow-500 uppercase tracking-widest mb-4">2. Hero & Mission</h3>
          <input [(ngModel)]="editableConfig.heroTitle" (ngModelChange)="updateRawJsonPreview()" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none">
          <textarea [(ngModel)]="editableConfig.heroSubtext" (ngModelChange)="updateRawJsonPreview()" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none h-24"></textarea>
          <textarea [(ngModel)]="editableConfig.missionText" (ngModelChange)="updateRawJsonPreview()" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none h-32"></textarea>
        </section>

        <!-- Contact & Address -->
        <section class="space-y-4">
          <h3 class="text-xs font-bold text-yellow-500 uppercase tracking-widest mb-4">3. Contact & Location</h3>
          <input [(ngModel)]="editableConfig.address" (ngModelChange)="updateRawJsonPreview()" placeholder="Physical Address" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none">
          <div class="grid grid-cols-2 gap-4">
            <input [(ngModel)]="editableConfig.email" (ngModelChange)="updateRawJsonPreview()" placeholder="Email" class="bg-white/5 border border-white/10 p-4 rounded-2xl outline-none">
            <input [(ngModel)]="editableConfig.phone" (ngModelChange)="updateRawJsonPreview()" placeholder="Phone" class="bg-white/5 border border-white/10 p-4 rounded-2xl outline-none">
          </div>
        </section>

        <!-- Coaches Manager -->
        <section class="space-y-6 bg-white/[0.02] p-8 rounded-[2.5rem] border border-white/5">
          <div class="flex justify-between items-center">
            <h3 class="text-xs font-bold text-yellow-500 uppercase tracking-widest">4. Mentor Gallery</h3>
            <button (click)="addCoach()" class="text-[10px] font-bold text-blue-400 uppercase tracking-widest hover:text-white transition">+ Add Coach</button>
          </div>
          
          <div class="space-y-4 max-h-[400px] overflow-y-auto pr-2">
            @for (coach of editableConfig.coaches; track $index) {
              <div class="flex gap-4 p-4 bg-white/5 rounded-2xl border border-white/5 items-center group">
                <input [(ngModel)]="coach.photo" (ngModelChange)="updateRawJsonPreview()" placeholder="Photo URL" class="w-20 bg-white/5 p-2 rounded-lg text-[10px] outline-none">
                <input [(ngModel)]="coach.name" (ngModelChange)="updateRawJsonPreview()" placeholder="Name" class="flex-grow bg-white/5 p-2 rounded-lg text-sm outline-none">
                <input [(ngModel)]="coach.title" (ngModelChange)="updateRawJsonPreview()" placeholder="Title" class="w-1/3 bg-white/5 p-2 rounded-lg text-sm outline-none">
                <button (click)="removeCoach($index)" class="text-red-500/30 group-hover:text-red-500 transition px-2">?</button>
              </div>
            }
          </div>
        </section>

        <button (click)="save()" class="w-full bg-yellow-500 text-black font-black py-6 rounded-[2rem] text-xl transition-all shadow-[0_20px_40px_rgba(234,179,8,0.2)] hover:-translate-y-1">
          Apply UI Changes to Website
        </button>
      </div>

      <!-- RIGHT: RAW JSON CODE EDITOR -->
      <div class="space-y-6">
        <div class="flex justify-between items-center px-4">
          <h3 class="text-xs font-bold text-blue-400 uppercase tracking-widest">Developer Console (JSON)</h3>
          <button (click)="copyToClipboard()" class="text-[10px] font-bold text-gray-500 hover:text-white uppercase transition tracking-widest">Copy to Clipboard</button>
        </div>

        <div class="relative">
          <textarea [(ngModel)]="rawJsonString" spellcheck="false" class="w-full h-[850px] bg-black/60 border border-white/10 p-10 rounded-[3rem] font-mono text-xs text-blue-300 outline-none focus:border-blue-500 leading-relaxed transition shadow-inner"></textarea>
          <div class="absolute top-6 right-10 text-[9px] text-blue-500/30 font-bold uppercase tracking-widest">Read/Write Object</div>
        </div>

        <button (click)="applyRawJson()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-6 rounded-[2rem] transition-all flex items-center justify-center gap-3">
           <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
           Sync Live from JSON Source
        </button>
      </div>

    </div>
  </div>
</div>
