<div class="pt-32 pb-48 px-6 max-w-xl mx-auto">
  <div class="glass p-12 rounded-[3rem] border-white/5 relative overflow-hidden">
    
    <div *ngIf="!submitted">
      <h2 class="text-4xl font-black mb-2 italic">Book a <span class="text-yellow-500">Free Trial</span></h2>
      <p class="text-gray-500 mb-10 text-sm">Leave your details and our coaches will call you back within 24 hours.</p>

      <form (ngSubmit)="onSubmit()" class="space-y-4">
        <input [(ngModel)]="formData.name" name="name" placeholder="Parent Name" required class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-yellow-500 outline-none transition text-white">
        <input [(ngModel)]="formData.email" name="email" type="email" placeholder="Email Address" required class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-yellow-500 outline-none transition text-white">
        <input [(ngModel)]="formData.phone" name="phone" placeholder="Phone Number" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl focus:border-yellow-500 outline-none transition text-white">
        
        <select [(ngModel)]="formData.program" name="program" class="w-full bg-[#1e293b] border border-white/10 p-4 rounded-2xl focus:border-yellow-500 outline-none transition text-white">
          <option value="">Select a Program</option>
          <option *ngFor="let p of config().programs" [value]="p.title">{{p.title}}</option>
        </select>

        <button type="submit" class="w-full py-5 rounded-2xl bg-yellow-500 text-black font-black text-lg hover:scale-[1.02] transition shadow-xl">
          Send Request Now
        </button>
      </form>
    </div>

    <!-- Success Message -->
    <div *ngIf="submitted" class="text-center py-10 animate-bounce">
       <div class="text-6xl mb-6">??</div>
       <h2 class="text-3xl font-black mb-4 uppercase">Request Sent!</h2>
       <p class="text-gray-400">Thank you, {{formData.name}}. We will contact you at {{formData.phone}} soon!</p>
       <button (click)="submitted = false" class="mt-8 text-yellow-500 font-bold uppercase tracking-widest text-xs underline">Send another request</button>
    </div>

  </div>
</div>
